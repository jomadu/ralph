loop:
  default_max_iterations: 10
  failure_threshold: 3
  ai_cmd: "echo test"
  signals:
    success: "<promise>SUCCESS</promise>"
    failure: "<promise>FAILURE</promise>"

prompts:
  test-override:
    path: "./prompts/build.md"
    name: "Test Override"
    description: "Test prompt with loop overrides"
    loop:
      default_max_iterations: 2
      failure_threshold: 1
      preamble: false
      signals:
        success: "DONE"
  
  test-no-override:
    path: "./prompts/build.md"
    name: "Test No Override"
    description: "Test prompt without loop overrides"
